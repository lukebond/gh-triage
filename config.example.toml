# gh-triage configuration
# Copy to ~/.config/gh-triage/config.toml and edit to suit.

# GitHub personal access token. Needs repo scope.
# Can also be set via the GH_TOKEN environment variable,
# or picked up automatically from the gh CLI (gh auth token).
# github_token = "ghp_your_token_here"

# Your GitHub username
github_user = "your-username"

# Poll interval in seconds
poll_interval = 120

# What "enter" does in the TUI: "browser" or "preview"
enter_action = "browser"

# notify-send urgency: "low", "normal", "critical"
notify_urgency = "normal"

# When to notify:
#   "new_item"     — only when an item is first seen
#   "new_activity"  — any time a tracked item is updated
notify_on = "new_activity"

# What to watch. Use "org/*" for an entire org, or "owner/repo" for specific repos.
# Items assigned to you, authored by you, mentioning you, or requesting your review
# will be tracked across all entries.
[watch]
repos = [
    "your-org/*",
    # "your-username/personal-project",
]

# Repos where you want to see *everything* (all issues and PRs),
# regardless of whether they involve you.
[watch.all]
repos = [
    # "your-org/important-repo",
]

# Repos to ignore completely, even if they match a watch rule.
[watch.ignore]
repos = [
    # "your-org/archived-repo",
]

# AI summary generation. Omit this section to disable summaries.
# The {prompt} placeholder is replaced with the generated prompt text.
# Examples:
#
# Claude Code CLI:
# [summary]
# command = "claude"
# args = ["-p", "{prompt}", "--no-session-persistence", "--allowedTools", "", "--output-format", "text"]
#
# Ollama (local, free):
# [summary]
# command = "ollama"
# args = ["run", "llama3.1", "{prompt}"]
